function show_detail(epic_key) {
  const data = CARDS[epic_key];
  if (!data) return;
  const p = document.getElementById('detailPanelContainer');
  let rows = '';
  for (const c of data.cards) {
    rows += `<tr><td>${c.key}</td><td>${c.summary}</td><td>${c.status}</td><td>${c.duedate}</td><td>${c.assignee}</td></tr>`;
  }
  p.innerHTML = `<div class="detail-panel visible">
    <button class="close-btn" onclick="this.parentElement.classList.remove('visible')">&times;</button>
    <h3>${data.project}: ${data.name} &mdash; ${data.cards.length} cards</h3>
    <div class="table-wrap"><table><thead><tr><th>Card</th><th>Atividade</th><th>Status</th><th>Prazo</th><th>Resp</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
}

function task_bar_html(task) {
  const pct = task.progress || 0;
  const overdue = task.noverdue > 0 ? `<span style="color:#ef4444;font-weight:600;"> ${task.noverdue} vencidos</span>` : '';
  return `
    <div style="padding:6px 10px;font-size:12px;line-height:1.3;">
      <strong>${task.name}</strong><br>
      <span style="color:#8b8fa3;">${task.project} &middot; ${task.status}</span>
      <span style="margin-left:8px;">${pct}%</span>${overdue}
    </div>`;
}

function render_sprint_bands() {
  const svg = document.querySelector('#gantt svg');
  const gridLayer = svg?.querySelector('g.grid');
  if (!gridLayer || !SPRINTS.length || typeof gantt === 'undefined') return;
  gridLayer.querySelectorAll('.sprint-band, .sprint-label').forEach(el => el.remove());
  const MS_H = 3600000;
  const st = new Date(gantt.gantt_start);
  const step = gantt.options.step;
  const cw = gantt.options.column_width;
  const hdr = gantt.options.header_height;
  const gh = parseInt(svg.getAttribute('height')) || 400;
  // Filter sprints by current project (if any)
  const filtered_sprints = currentFilter
    ? SPRINTS.filter(function(s) { return s.project === currentFilter; })
    : SPRINTS;
  for (const s of filtered_sprints) {
    if (!s.startDate || !s.endDate) continue;
    const ss = new Date(s.startDate + 'T00:00:00');
    const se = new Date(s.endDate + 'T00:00:00');
    if (isNaN(ss) || isNaN(se)) continue;
    const x = (ss - st) / MS_H / step * cw;
    const w = Math.max(2, (se - ss) / MS_H / step * cw);
    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', x); rect.setAttribute('y', hdr);
    rect.setAttribute('width', w); rect.setAttribute('height', gh - hdr);
    rect.setAttribute('class', 'sprint-band ' + s.state);
    // Use direct fill/stroke attributes for reliable rendering
    if (s.state === 'active') {
      rect.setAttribute('fill', '#3b82f6');
      rect.setAttribute('opacity', '0.5');
      rect.setAttribute('stroke', '#93c5fd');
      rect.setAttribute('stroke-width', '2');
    } else if (s.state === 'closed') {
      rect.setAttribute('fill', '#22c55e');
      rect.setAttribute('opacity', '0.35');
      rect.setAttribute('stroke', '#86efac');
      rect.setAttribute('stroke-width', '1');
    } else {
      rect.setAttribute('fill', '#6366f1');
      rect.setAttribute('opacity', '0.35');
      rect.setAttribute('stroke', '#a5b4fc');
      rect.setAttribute('stroke-width', '1');
      rect.setAttribute('stroke-dasharray', '4,3');
    }
    gridLayer.appendChild(rect);
    if (s.state === 'active') {
      var lb = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      lb.setAttribute('x', x + 4); lb.setAttribute('y', hdr - 10);
      lb.setAttribute('class', 'sprint-label');
      lb.textContent = s.name;
      gridLayer.appendChild(lb);
    }
  }
}

function filter_project(name) {
  // Update button active state
  document.querySelectorAll('.proj-btn').forEach(function(b) {
    b.classList.remove('proj-btn-active');
    b.style.background = b.style.border = '';
    if (b.textContent === 'Todos') {
      b.style.background = ''; b.style.color = ''; b.style.border = '';
    }
  });
  // Filter tasks
  var filtered = name ? TASKS.filter(function(t) { return t.project === name; }) : TASKS;
  var count = filtered.length;
  
  // Update legend visibility
  document.querySelectorAll('.gantt-legend span').forEach(function(s) {
    s.style.display = (name && !s.textContent.includes(name)) ? 'none' : '';
  });
  
  // Find all project buttons and highlight the active one
  document.querySelectorAll('.proj-btn').forEach(function(b) {
    if ((name && b.textContent === name) || (!name && b.textContent === 'Todos')) {
      b.style.background = 'var(--accent)';
      b.style.color = '#fff';
      b.style.border = 'none';
      b.style.fontWeight = '600';
    }
  });
  
  currentFilter = name;
  document.querySelector('#gantt').innerHTML = '';
  gantt = new Gantt('#gantt', filtered, {
    view_mode: 'Month',
    date_format: 'YYYY-MM-DD',
    bar_height: 32,
    on_click: function(task) { show_detail(task.id); },
    custom_popup_html: function(task) { return task_bar_html(task); },
    on_view_change: function() { render_sprint_bands(); }
  });
  render_sprint_bands();
  
  // Update epic count
  var counter = document.querySelector('.gantt-controls span:last-child');
  if (counter) counter.textContent = count + ' épicos' + (name ? ' — ' + name : '');
